<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Produto</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="box one">
            <div class="details">
                <div class="topic">Descrição</div>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit officia dignissimos beatae quaerat quibusdam consequuntur nisi officiis. Itaque porro ad optio nihil maxime, odit ducimus fugit hic ullam, sequi sunt!</p>
                <div class="rating">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                </div>
                <div class="price-box">
                    <div class="discount">R$5200,00</div>
                    <div class="price">R$4800,00</div>
                </div>
            </div>
            <div class="button1">
                <button>Add no carrinho</button>
            </div>
        </div>
        <div class="box two">
            <div class="image-box">
                <div class="image">
                    <img src="img/camera.png" alt="">
                </div>
                <div class="info">
                    <div class="brand">SONY</div>
                    <div class="name">SONY ALPHA A7 KIT</div>
                    <div class="shipping">Frete grátis</div>
                    <div class="button2">
                        <button>Login para mais</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
